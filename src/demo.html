<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>slope-server demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
    <style>
      html,
      body,
      #map {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      var map = new maplibregl.Map({
        container: "map",
        center: [__CENTER_LON__, __CENTER_LAT__],
        zoom: __ZOOM__,
        hash: true,
        style: {
          version: 8,
          sources: {
            osm: {
              type: "raster",
              tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
              tileSize: 256,
              minzoom: 0,
              maxzoom: 19,
              attribution:
                '<a href="https://www.openstreetmap.org/copyright">&copy; OpenStreetMap</a>',
            },
            slope: {
              type: "raster-dem",
              tiles: ["__SLOPE_URL__"],
              tileSize: 512,
              encoding: "mapbox",
              minzoom: __MINZOOM__,
              maxzoom: __MAXZOOM__,
            },
          },
          layers: [
            {
              id: "osm",
              type: "raster",
              source: "osm",
            },
            {
              id: "slope-relief",
              type: "color-relief",
              source: "slope",
              paint: {
                "color-relief-color": [
                  "interpolate",
                  ["linear"],
                  ["elevation"],
                   0, "rgba(0, 0, 0, 0)",
                  29, "rgba(0, 0, 0, 0)",
                  30, "#f5f79c",
                  35, "#f9c857",
                  40, "#fa6538",
                  45, "#ea482f",
                  50, "#dd3228",
                  55, "#d82525",
                ],
              },
            },
          ],
        },
      });

      map.addControl(
        new maplibregl.NavigationControl({
          visualizePitch: true,
          visualizeRoll: true,
          showZoom: true,
          showCompass: true,
        }),
      );
    </script>
  </body>
</html>
