<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>slope-server demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css"
    />
    <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
    <style>
      html,
      body,
      #map {
        margin: 0;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      var map = new maplibregl.Map({
        container: "map",
        center: [__CENTER_LON__, __CENTER_LAT__],
        zoom: __ZOOM__,
        hash: true,
        style: {
          version: 8,
          sources: {
            osm: {
              type: "raster",
              tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
              tileSize: 256,
              minzoom: 0,
              maxzoom: 19,
              attribution:
                '<a href="https://www.openstreetmap.org/copyright">&copy; OpenStreetMap</a>',
            },
            slope: {
              type: "raster-dem",
              url: "/slope",
            },
          },
          layers: [
            {
              id: "osm",
              type: "raster",
              source: "osm",
            },
            {
              id: "slope-relief",
              type: "color-relief",
              source: "slope",
              paint: {
                "color-relief-color": [
                  "interpolate",
                  ["linear"],
                  ["elevation"],
                  0,
                  "rgba(0, 0, 0, 0)",
                  29,
                  "rgba(0, 0, 0, 0)",
                  30,
                  "rgba(245, 247, 156, 0.4)",
                  35,
                  "rgba(249, 200, 87, 0.4)",
                  40,
                  "rgba(250, 101, 56, 0.4)",
                  45,
                  "rgba(234, 72, 47, 0.4)",
                  50,
                  "rgba(221, 50, 40, 0.4)",
                  55,
                  "rgba(216, 37, 37, 0.4)",
                ],
              },
            },
          ],
        },
      });

      map.addControl(
        new maplibregl.NavigationControl({
          visualizePitch: true,
          visualizeRoll: true,
          showZoom: true,
          showCompass: true,
        }),
      );

      map.showTileBoundaries = true;
    </script>
  </body>
</html>
